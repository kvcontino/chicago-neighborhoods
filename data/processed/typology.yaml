  secondary_archetype: industrial-cool
  key_phrases:
  - downtown business district transitioning into a residential neighborhood
  - ~30k housing units (2022) + 1,700+ approved 2024 + LaSalle conversion adds 1k more
  - office-to-residential conversion wave post-pandemic
  - studio rents ~$2k; LaSalle initiative units ~$1k (affordable component)
  - every CTA line converges; Metra hub
  notable_for: Now actually plausible as a residential neighborhood — pandemic-era office
