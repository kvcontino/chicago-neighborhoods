  - '26th Street: 2nd-highest tax-generating commercial corridor citywide (after Mag Mile)'
  - 81% Latino (latest Census)
  - Little Village arch (1990, city landmark)
  - Pink Line + Cermak/Kedzie
  notable_for: Anchor of Mexican-American Chicago — 26th Street commercial corridor is the
    highest-grossing Latino retail district in the US. Strong civic + cultural infrastructure
    (parade, churches, interfaith organizing). Distinct from Pilsen — less gentrified, more
