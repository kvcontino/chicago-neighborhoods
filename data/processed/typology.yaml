WEST RIDGE:
  archetype: diverse-bohemian
  secondary_archetype: asian-cultural
  key_phrases:
  - Chicago's largest Orthodox Jewish population
  - 'Devon Avenue: South Asian + Jewish commercial corridor side-by-side'
  - post-1965 Indian/Pakistani wave layered over earlier Jewish settlement
  - Western/Devon/Touhy retail nodes
  - Red Line (Loyola station) at west edge
  notable_for: One of the most distinctive cultural-religious neighborhoods in Chicago — Orthodox
    Jewish institutions (synagogues, kosher delis, Yeshiva schools) interwoven with South
    Asian groceries, restaurants, and sari shops along Devon. 'Re-Jew-venating Devon Avenue'
    is a real ongoing project (per WBEZ). Far cheaper than Rogers Park/Edgewater eastward.
  caveats: Hate-crime incidents (2022 anti-Semitic vandalism cluster) and occasional violent
    incidents reported. Far north — slow transit. Both anchor communities are tight-knit;
    secular non-South-Asian professional arrival is demographically distinct.
  citations:
