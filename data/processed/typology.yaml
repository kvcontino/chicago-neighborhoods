NEAR NORTH SIDE:
  archetype: established-lakefront
  secondary_archetype: young-prof-nightlife
  key_phrases:
  - River North + Gold Coast + Streeterville subareas
  - Magnificent Mile retail spine + Navy Pier
  - highest-end Chicago residential outside Lincoln Park
  - Red Line + bus dense; lakefront path access
  - tourist + business + residential mix
  notable_for: Most amenity-dense non-Loop CA in Chicago. River North = high-end restaurants/galleries/clubs;
    Gold Coast = old-money lakefront high-rises; Streeterville = hospital/condo wedge. Walkability
    and transit at the top of the city. Strong young-professional + wealthy-empty-nester resident
    mix.
  caveats: Most expensive rents in our data ($2,791 median). Tourist density in River North
    + Mag Mile core can wear thin as a resident. Gold Coast can feel impersonal/transactional.
    Neighborhood feel varies sharply between River North (going-out) and Gold Coast (quiet
    residential).
  citations:
