BRIDGEPORT:
  archetype: diverse-bohemian
  secondary_archetype: gentrifying-edge
  key_phrases:
  - historic Irish-American political-machine stronghold (Daley clan)
  - now 41% Asian, 20% Hispanic, 35% white (per WBEZ)
  - Ramova Theater restoration, Marz Brewing — emerging art/food scene
  - housing up ~400% over 10 years
  - Red/Orange Line + Sox-35th
  notable_for: South Side neighborhood undergoing one of Chicago's most striking demographic
    transitions — once white-ethnic Irish/German political machine base, now plurality-Asian
    with a growing arts/brewery scene (Marz Brewing, Ramova Theater). Adjacent to Chinatown
    (Armour Square). Lower density and more affordable than North Side equivalents.
  caveats: History of racial exclusion in the neighborhood remains in living memory; documented
    incidents into the 2010s. Vibe is shifting fast — what's true this year may not be in
    two years. Less walkable than appears on a map; commercial nodes are spread out.
