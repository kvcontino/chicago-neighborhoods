ROGERS PARK:
  archetype: diverse-bohemian
  secondary_archetype: university-adjacent
  key_phrases:
  - Loyola University anchor on the north end
  - highly racially + economically diverse
  - lakefront access without Lincoln Park price tag
  - Red Line spine; long commute to Loop
  - Devon Avenue South Asian corridor (Edgewater border)
  notable_for: One of Chicago's most diverse Community Areas across race, class, and immigration
    status. Lakefront access, Loyola campus, and a long-running independent arts/literary
    scene (Heartland Cafe alumni, small theaters). Rents materially below comparable North
    Side neighborhoods.
  caveats: Far north — Red Line commute to Loop is 45+ minutes. Block-level variation is significant;
    the lakefront blocks are very different from blocks west of Clark. Some longstanding concerns
    about petty property crime; check block-specific data before committing.
