LINCOLN SQUARE:
  archetype: established-mainstreet
  secondary_archetype: family-residential
  key_phrases:
  - DANK Haus + Chicago Brauhaus German-American cultural anchor
  - 'Lincoln Ave near Western: pedestrianized commercial spine'
  - post-gentrification stable demographic
  - Brown Line spine (Western, Damen, Rockwell stops)
  - Old Town School of Folk Music
  notable_for: One of Chicago's strongest 'main street' walkable cores outside the lakefront
    — German-heritage commercial corridor with cultural center, music institution (Old Town
    School), and dense food/retail along Lincoln Ave. Quieter and more family-tilting than
    Lake View; more amenity-rich than Irving Park or North Center.
  caveats: 'Limited nightlife — mostly daytime/early-evening commerce. Subcorridor concentration:
    walk away from Lincoln Ave and density drops fast. Family-tilting demographic may feel
    quiet for newly-single arrival.'
