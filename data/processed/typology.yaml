  - mural tradition rooted in 1920s Mexican muralist movement
  - 10,300 Hispanic residents lost 2000-2010 to gentrification pressure
  - Pilsen Housing Cooperative resisting displacement
  - Pink Line + 18th St commercial spine
  notable_for: Chicago's most visible Mexican-American neighborhood and one of the strongest
    mural traditions in the US — civic + artistic identity are inseparable. National Museum
    of Mexican Art anchor. Restaurant scene from taquerias to upscale Mexican (Honey Butter,
    etc.). Cheaper than near-Loop neighborhoods despite the proximity.
