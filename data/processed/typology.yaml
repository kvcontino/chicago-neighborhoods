LAKE VIEW:
  archetype: young-prof-nightlife
  secondary_archetype: lgbtq-anchor
  key_phrases:
  - Wrigleyville sports/bar core
  - Boystown / Northalsted LGBTQ commercial district
  - high renter share, transient young-professional turnover
  - Belmont/Halsted/Clark commercial corridors
  - CTA Red+Brown line spine
  notable_for: Highest amenity density on the North Side outside the Loop; two distinct sub-areas
    — Wrigleyville's bar scene around the ballpark and Northalsted's LGBTQ commercial district.
    Heavy weekend foot traffic; weeknight calmer.
  caveats: Gameday surge crowds and noise around Wrigley; turnover-driven rental market means
    weak neighbor continuity. Bar-density concentrates rather than spreads, so block-level
    vibe varies sharply.
